<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona AI Clicker</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fas fa-robot"></i> Persona AI</h1>
            <div class="persona-selector">
                <label for="persona-select">대화 상대:</label>
                <select id="persona-select">
                    <option value="다정한 선생님">다정한 선생님</option>
                    <option value="장난기 많은 로봇 친구">로봇 친구</option>
                    <option value="지혜로운 호랑이">지혜로운 호랑이</option>
                    <option value="우주 탐험가">우주 탐험가</option>
                </select>
            </div>
        </header>

        <main id="chat-window">
            <div class="message ai-message">
                안녕! 나는 네가 선택한 친구야. 무엇이든 물어봐!
            </div>
        </main>

        <footer>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
                <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
